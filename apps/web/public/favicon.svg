<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="skybase">
  <!-- Background: rounded dark square matching the app's bg color. -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  <!-- Terminal prompt chevron in the app accent blue (4f9cff). -->
  <path d="M 18 18 L 30 32 L 18 46"
        stroke="#4f9cff"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  <!-- Cursor block to the right of the chevron, anchoring this as a prompt. -->
  <rect x="36" y="40" width="14" height="6" rx="1" fill="#4f9cff"/>
</svg>
